openapi: 3.1.0
info:
  title: Admin Post Workflow API
  version: 0.1.0
  description: >
    Contract for the admin post management workflow used by the Astro admin UI
    after the page-oriented refactor.
servers:
  - url: https://example.com
paths:
  /api/admin/posts:
    get:
      summary: List posts for the admin posts table
      operationId: listAdminPosts
      responses:
        "200":
          description: Posts loaded successfully
          content:
            application/json:
              schema:
                type: object
                required: [posts]
                properties:
                  posts:
                    type: array
                    items:
                      $ref: "#/components/schemas/PostSummary"
        "302":
          description: Redirect to login or fallback route when access is denied
    post:
      summary: Create a new post
      operationId: createAdminPost
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PostWritePayload"
      responses:
        "201":
          description: Post created successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PostWriteResult"
        "400":
          description: Validation error
        "302":
          description: Redirect to login or fallback route when access is denied
  /api/admin/posts/{id}:
    get:
      summary: Fetch one post for the dedicated edit page
      operationId: getAdminPost
      parameters:
        - $ref: "#/components/parameters/PostId"
      responses:
        "200":
          description: Post loaded successfully
          content:
            application/json:
              schema:
                type: object
                required: [post]
                properties:
                  post:
                    $ref: "#/components/schemas/PostDetail"
        "404":
          description: Post not found
        "302":
          description: Redirect to login or fallback route when access is denied
    post:
      summary: Update an existing post
      operationId: updateAdminPost
      parameters:
        - $ref: "#/components/parameters/PostId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PostWritePayload"
      responses:
        "200":
          description: Post updated successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PostWriteResult"
        "400":
          description: Validation error
        "404":
          description: Post not found
        "302":
          description: Redirect to login or fallback route when access is denied
  /api/admin/posts/{id}/delete:
    post:
      summary: Delete a post from the posts list
      operationId: deleteAdminPost
      parameters:
        - $ref: "#/components/parameters/PostId"
      responses:
        "200":
          description: Post deleted successfully
          content:
            application/json:
              schema:
                type: object
                required: [deleted, redirectTo]
                properties:
                  deleted:
                    type: boolean
                    const: true
                  redirectTo:
                    type: string
                    example: /admin/posts?deleted=1
        "404":
          description: Post not found
        "302":
          description: Redirect to login or fallback route when access is denied
components:
  parameters:
    PostId:
      name: id
      in: path
      required: true
      schema:
        type: integer
        minimum: 1
  schemas:
    PostSummary:
      type: object
      required: [id, title, description, slug, status, updatedAt, viewHref, editHref]
      properties:
        id:
          type: integer
          minimum: 1
        title:
          type: string
        description:
          type: string
        slug:
          type: string
        status:
          type: string
          enum: [draft, published]
        updatedAt:
          type: string
          format: date-time
        viewHref:
          type: string
        editHref:
          type: string
    PostDetail:
      allOf:
        - $ref: "#/components/schemas/PostSummary"
        - type: object
          required: [contentMarkdown]
          properties:
            heroImage:
              type: string
              nullable: true
            pubDate:
              type: string
              format: date-time
            contentMarkdown:
              type: string
    PostWritePayload:
      type: object
      required: [title, slug, description, contentMarkdown, status]
      properties:
        title:
          type: string
          minLength: 1
        slug:
          type: string
          minLength: 1
        description:
          type: string
          minLength: 1
        heroImage:
          type: string
          nullable: true
        status:
          type: string
          enum: [draft, published]
        pubDate:
          type: string
          format: date-time
          nullable: true
        contentMarkdown:
          type: string
          minLength: 1
    PostWriteResult:
      type: object
      required: [postId, redirectTo, message]
      properties:
        postId:
          type: integer
          minimum: 1
        redirectTo:
          type: string
          example: /admin/posts
        message:
          type: string
